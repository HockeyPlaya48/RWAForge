[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules"]
test = "test-foundry"
cache_path = "cache_forge"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/"
]

[rpc_endpoints]
robinhood_mainnet = "${RH_MAINNET_RPC_URL}"
robinhood_testnet = "${RH_TESTNET_RPC_URL}"
